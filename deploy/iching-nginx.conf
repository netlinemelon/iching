# =============================================================================
# iching-ai.cn — nginx 反向代理配置
# 适用环境：阿里云 ECS 2核 2GiB 1Mbps
# 应用：FastAPI + SQLite，监听 127.0.0.1:8088
# =============================================================================

# 注意：gzip 配置放在 http 块中（通常在 /etc/nginx/nginx.conf 中已存在）
# 如果该文件作为独立站点配置包含，下面的 gzip 行会生效。
# 建议也在主配置 /etc/nginx/nginx.conf 的 http 块中确认以下设置。

# ---------- HTTP → HTTPS 强制跳转 ----------
server {
    listen 80;
    listen [::]:80;
    server_name iching-ai.cn www.iching-ai.cn;

    # 301 永久重定向到 HTTPS 版本
    return 301 https://$host$request_uri;
}

# ---------- HTTPS 服务 ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iching-ai.cn www.iching-ai.cn;

    # ========== SSL 配置 ==========
    # 证书路径（由 certbot 自动生成和管理）
    ssl_certificate     /etc/letsencrypt/live/iching-ai.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iching-ai.cn/privkey.pem;

    # 优先使用现代加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS（浏览器强制 HTTPS，有效期 6 个月）
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # ========== 安全相关响应头 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== 日志配置 ==========
    access_log /var/log/nginx/iching-access.log;
    error_log  /var/log/nginx/iching-error.log;

    # ========== 静态文件（由 nginx 直接服务，不经过 Python）==========
    # 提高并发性能，降低应用服务器负载
    location /static/ {
        # 静态文件目录别名（注意：URL 中的 /static 会被替换为 alias 路径）
        alias /opt/iching/app/static/;

        # 1Mbps 带宽优化：gzip 压缩（关键！）
        gzip_static on;          # 优先使用预压缩的 .gz 文件（需手动生成）
        gzip on;                 # 动态压缩
        gzip_types text/css application/javascript image/svg+xml;
        gzip_min_length 256;     # 小于 256 字节的文件不压缩
        gzip_vary on;            # 告知缓存服务器根据 Accept-Encoding 区分缓存

        # 1Mbps 带宽优化：强缓存 7 天
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;

        # 关闭访问日志（减少磁盘 I/O）
        access_log off;
    }

    # ========== 网站图标 ==========
    location /favicon.ico {
        alias /opt/iching/app/static/img/favicon.ico;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== 反向代理到 FastAPI 应用 ==========
    location / {
        # 请求转发到本地 FastAPI 应用（端口 8088）
        proxy_pass http://127.0.0.1:8088;

        # HTTP/1.1 必需
        proxy_http_version 1.1;

        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关闭代理缓冲（适合流式响应和 WebSocket）
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # 请求体大小限制（防止大请求攻击）
        client_max_body_size 1m;

        # 对 HTML 类型也启用 gzip（API 响应也受益）
        gzip on;
        gzip_types text/html application/json text/plain;
        gzip_min_length 256;
        gzip_proxied any;
        gzip_vary on;
    }

    # ========== 健康检查端点（无日志，降低噪声）==========
    location /api/health {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        access_log off;          # 健康检查不记日志
        proxy_read_timeout 5s;   # 快速超时
    }

    # ========== 拒绝访问 .env 等敏感文件 ==========
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }
}
