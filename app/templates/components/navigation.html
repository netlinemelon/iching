<nav class="navbar" x-data="{ mobileOpen: false }">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <span class="logo-icon">☰</span>
      <span>八卦 I Ching</span>
    </a>

    <button class="hamburger" @click="mobileOpen = !mobileOpen" aria-label="菜单">
      <span x-text="mobileOpen ? '✕' : '☰'"></span>
    </button>

    <ul class="navbar-links" :class="{ 'open': mobileOpen }" @click="mobileOpen = false">
      <li><a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>首页</a></li>
      <li><a href="/divine/" {% if request.url.path.startswith('/divine') %}class="active"{% endif %}>占卜</a></li>
      <li><a href="/hexagram/" {% if request.url.path.startswith('/hexagram') %}class="active"{% endif %}>六十四卦</a></li>
      <li><a href="/study/" {% if request.url.path.startswith('/study') %}class="active"{% endif %}>学习</a></li>
      <li><a href="/history/" {% if request.url.path.startswith('/history') %}class="active"{% endif %}>历史</a></li>
      <li>
        <button class="theme-toggle" aria-label="切换主题">🌙</button>
        <script>(function(){var t='light';try{t=localStorage.getItem('iching-theme')}catch(e){}if(!t)try{t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}catch(e){}var b=document.querySelector('.theme-toggle');if(b){b.textContent=t==='dark'?'☀':'🌙';b.setAttribute('aria-label',t==='dark'?'切换亮色主题':'切换暗色主题')}})();</script>
      </li>
    </ul>
  </div>
</nav>
