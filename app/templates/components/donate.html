<div x-data="{ open: false }" class="donate-float">
  <button @click="open = !open" class="donate-btn" title="赞助支持" aria-label="赞助支持">
    ☕
  </button>
  <div x-show="open" @click.outside="open = false" class="donate-card" x-transition.opacit.duration.200ms>
    <h4>支持开源易经占卜</h4>
    <p class="text-muted" style="margin-bottom: var(--space-sm);">扫码赞助，帮助服务器运行</p>
    <div class="qr-grid">
      <div class="qr-item">
        <img src="/static/img/wechat-qr.jpg" alt="微信赞赏" onerror="this.parentElement.innerHTML='<div class=qr-placeholder><span>微信<br>收款码</span><small>static/img/wechat-qr.jpg</small></div><span>微信</span>'">
        <span>微信</span>
      </div>
      <div class="qr-item">
        <div class="qr-placeholder">
          <span>支付宝<br>收款码</span>
          <small>放入 static/img/alipay-qr.jpg</small>
        </div>
        <span>支付宝</span>
      </div>
    </div>
    <p class="text-tiny text-muted" style="margin-top: var(--space-sm); margin-bottom: 0;">将收款码图片放入 static/img/ 目录，替换同名文件即可</p>
  </div>
</div>
